on: [workflow_call]

name: "Check"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
      - parallel:
          -
            name: Run ShellCheck
            uses: reviewdog/action-shellcheck@v1
            with:
              level: warning
              fail_level: any
              reporter: github-pr-check
              filter_mode: nofilter
              pattern: |
                *.sh
                *.bash
                *.bats
                *.ksh
              check_all_files_with_shebangs: "true"
              shellcheck_flags: >-
                -x
                --source-path=src
                -e SC1091
                -e SC2001
                -e SC2002
                -e SC2034
                -e SC2153
                -e SC2317
              github_token: ${{ github.token }}
          -
            name: Lint Dockerfile
            uses: hadolint/hadolint-action@v3.3.0
            with:
              dockerfile: Dockerfile
              ignore: DL3006,DL3008
              failure-threshold: warning
          -
            name: Validate XML
            uses: action-pack/valid-xml@v1
            with:
              path: "assets"
              file-endings: ".xml"
          -
            name: Validate JSON and YML files
            uses: GrantBirki/json-yaml-validate@v5
