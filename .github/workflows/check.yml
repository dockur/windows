on: [workflow_call]

name: "Check"

permissions: {}

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
      - parallel:
          -
            name: Run ShellCheck
            uses: ludeeus/action-shellcheck@master
            with:
              check_together: "yes"
            env:
              SHELLCHECK_OPTS: >-
                -x
                -P SCRIPTDIR
                -e SC2001
                -e SC2002
                -e SC2034
                -e SC2064
                -e SC2153
                -e SC2317
                -e SC2028
          -
            name: Lint Dockerfile
            uses: hadolint/hadolint-action@v3.3.0
            with:
              dockerfile: Dockerfile
              ignore: DL3006,DL3008
              failure-threshold: warning
          -
            name: Validate XML
            uses: action-pack/valid-xml@v1
            with:
              path: "assets"
              file-endings: ".xml"
          -
            name: Validate JSON and YML files
            uses: GrantBirki/json-yaml-validate@v5
