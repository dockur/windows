name: Links

on:
  workflow_dispatch:

concurrency:
  group: links
  cancel-in-progress: false

jobs:
  links:
    name: Links
    runs-on: ubuntu-latest
    permissions:
      actions: read
      packages: read
      contents: read
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      -
        name: Build curl-impersonate
        run: |
          sudo apt install build-essential pkg-config cmake ninja-build curl autoconf automake libtool
          # For the Firefox version only
          sudo apt install python3-pip libnss3
          pip install gyp-next
          export PATH="$PATH:~/.local/bin" # Add gyp to PATH
          git clone https://github.com/lwthiker/curl-impersonate.git
          cd curl-impersonate
          mkdir build && cd build
          ../configure
          # Build and install the Firefox version
          make firefox-build
          sudo make firefox-install
          # You may need to update the linker's cache to find libcurl-impersonate
          sudo ldconfig
          # Optionally remove all the build files
          cd ../ && rm -Rf build
      -
        name: Validate Links
        run: |
          errors=0
          count=0
          host=""
          declare -A seen
          check() {
            local url="$1" http
            http=$(curl_ff117 -sSL -o /dev/null -w "%{http_code}" --user-agent "Mozilla/5.0 (X11; Linux x86_64; rv:95.0) Gecko/20100101 Firefox/95.0)" --max-time 10 -I -- "$url" 2>&1) || http="000"
            [[ "$http" == 2* ]] && return 0
            http=$(curl_ff117 -sSL -o /dev/null -w "%{http_code}" --user-agent "Mozilla/5.0 (X11; Linux x86_64; rv:95.0) Gecko/20100101 Firefox/95.0)" --max-time 10 -r "0-0" -- "$url" 2>&1) || http="000"
            printf '%s\n' "HTTP: $http" 
            [[ "$http" == 2* ]]
          }
          while IFS= read -r line; do
            if [[ "$line" =~ ^[[:space:]]*local[[:space:]]+host=\"(https://[^\"]+)\" ]]; then
              host="${BASH_REMATCH[1]%/}"
              continue
            fi
            [[ "$line" =~ ^[[:space:]]*url=\"(.+)\" ]] || continue
            val="${BASH_REMATCH[1]#/}"
            if [[ "$val" == https://* ]]; then
              url="$val"
            elif [[ -n "$host" ]]; then
              url="$host/$val"
            else
              continue
            fi
            [[ -v seen[$url] ]] && continue
            seen[$url]=1
            count=$((count + 1))
            if check "$url"; then
              echo "  OK: $url"
            else
              echo "FAIL: $url"
              errors=$((errors + 1))
            fi
          done < "src/define.sh"
          echo ""
          printf '%d/%d links valid\n' "$(( count - errors ))" "$count"
          (( errors == 0 ))
